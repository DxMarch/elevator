name: Line count
on:
  push:
    branches: [main]
jobs:
  update_readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
        working-directory: ./scripts
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc jq

      - name: Count lines of code and update README
        run:  chmod +x ./cloc_and_update_readme.sh && ./cloc_and_update_readme.sh 
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add ../README.md 
          
          if git diff --staged --quiet; then
            echo "No changes to line count."
          else
            git commit -m "docs: update line count (auto) [skip ci]"
            git push
          fi
